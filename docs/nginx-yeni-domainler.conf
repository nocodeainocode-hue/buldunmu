# ============================================================
# Nginx config — 4 yeni domain (her biri ayrı SSL)
# Cloudflare Full (Strict) SSL icin Origin Certificate kullan
# ============================================================
#
# Cloudflare'de her domain icin ayri Origin Certificate olustur:
#   SSL/TLS > Origin Server > Create Certificate
#   RSA 2048, PEM format
#   Sunucuda: /etc/nginx/ssl/<domain>.pem ve <domain>.key
#
# Kurulum:
#   ln -s /var/www/firmarehberi/docs/nginx-yeni-domainler.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# ============================================================

# -----------------------------------------------
# esnafharita.com.tr
# -----------------------------------------------
server {
    listen 80;
    server_name esnafharita.com.tr www.esnafharita.com.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name esnafharita.com.tr www.esnafharita.com.tr;

    ssl_certificate     /etc/nginx/ssl/esnafharita.com.tr.pem;
    ssl_certificate_key /etc/nginx/ssl/esnafharita.com.tr.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/firmarehberi/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

