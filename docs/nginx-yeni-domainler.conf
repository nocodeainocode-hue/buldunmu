# ============================================================
# 21 YENI DOMAIN — Her biri ayri certbot SSL
# ============================================================
# 
# Certbot bu bloklari otomatik guncelleyecek.
# SSL yollari certbot standardi: /etc/letsencrypt/live/<domain>/
#
# ONEMLI: Asagidaki bloklar certbot calistirilmadan once HTTP olarak
# calisir. Certbot --nginx ile SSL eklenince 443 bloklari otomatik
# yapilandirilir.
# ============================================================

