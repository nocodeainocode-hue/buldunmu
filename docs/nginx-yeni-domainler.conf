    listen 443 ssl http2;
    server_name yerelio.com.tr www.yerelio.com.tr;

    ssl_certificate     /etc/letsencrypt/live/yerelio.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yerelio.com.tr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/firmarehberi/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
