# ============================================================
# Nginx config — 21 yeni domain + önceki 4 domain (toplam 25)
# Tüm SSL'ler certbot (Let's Encrypt) ile ayrı ayrı alınacak
# Cloudflare: DNS only (gray cloud) — SSL/TLS: Full (strict)
# ============================================================
#
# KURULUM ADIMLARI:
#
# 1) Cloudflare DNS (kullanıcı tarafından):
#    Her domain için Cloudflare'e A kaydı ekle (sunucu IP'sine)
#    Proxy: DNS only (gray cloud) — çünkü certbot HTTP-01 challenge
#    kullanacak.
#
# 2) Nginx config'i aktif et:
#    cp docs/nginx-yeni-domainler.conf /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx
#
# 3) Her domain için ayrı certbot SSL (örnek):
#    certbot --nginx -d yerelio.com.tr -d www.yerelio.com.tr
#    certbot --nginx -d kobiva.com.tr -d www.kobiva.com.tr
#    ... (21 domain, 21 ayrı certbot komutu)
#
#    NOT: Tum domain sslleri AYRI alinacak. Tek komutta 21 domain
#    yazarsan rate-limit'e takilirsin (50 domain/week).
#    Her domain kendi sertifikasini alir.
#
# 4) Certbot sonrasi kontrol:
#    systemctl reload nginx
#    https://herhangidomain.com.tr (test)
#
# ============================================================

# -----------------------------------------------
# Mevcut domainler (onceki config)
# -----------------------------------------------

# esnafharita.com.tr
server {
    listen 80;
    server_name esnafharita.com.tr www.esnafharita.com.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name esnafharita.com.tr www.esnafharita.com.tr;

    ssl_certificate     /etc/nginx/ssl/esnafharita.com.tr.pem;
    ssl_certificate_key /etc/nginx/ssl/esnafharita.com.tr.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/firmarehberi/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

