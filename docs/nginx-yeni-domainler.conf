# ============================================================
# Nginx config — 4 yeni domain için
# Eski domainlerin yanına ekle, symlink ile sites-enabled'a bağla
# Cloudflare NS oturunca certbot ile SSL çek: certbot --nginx -d domain.com.tr
# ============================================================

server {
    listen 80;
    server_name esnafharita.com.tr www.esnafharita.com.tr;
    root /var/www/firmarehberi/public;
    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

